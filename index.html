<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Terminal</title>
<style>
:root{--green:#00ff41;--red:#ff0033}
*{box-sizing:border-box;margin:0;padding:0;font-family:Consolas,monospace;user-select:none}
body{background:#000;color:var(--green);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* شاشة التحميل */
#loader-screen{position:fixed; inset:0; background:#000; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;}
.top{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px;height:32%}
.box{border:1px solid var(--green);background:#000;overflow:hidden;position:relative}

.radar{background:radial-gradient(circle at 50% 50%, #001a00 0%, #000 70%);display:flex;align-items:center;justify-content:center}
.radar svg{width:100%;height:100%;filter:drop-shadow(0 0 4px var(--green))}
.sweep{transform-origin:50% 50%;animation:spin 2.5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.blip{fill:var(--green);opacity:0;animation:ping 1.8s infinite}
.blip:nth-child(2){animation-delay:.6s}
.blip:nth-child(3){animation-delay:1.2s}
@keyframes ping{0%,60%{opacity:0;transform:scale(.5)}40%{opacity:1;transform:scale(1)}100%{opacity:0}}

#locPoint{fill:var(--red);opacity:0;transition:opacity 0.5s}
.wave{fill:none;stroke:var(--red);stroke-width:1;opacity:0}
.pulse{animation:waveAnim 2s infinite}
.pulse2{animation:waveAnim 2s infinite; animation-delay:1s}

@keyframes waveAnim{
    0% {r:3; opacity:1;}
    100% {r:15; opacity:0;}
}

#locMsg{fill:var(--red);font-size:10px;opacity:0;transition:opacity 0.5s;font-weight:bold;text-shadow: 0 0 5px var(--red), 0 0 10px var(--red);}
.grid{stroke:#0f0;stroke-width:.5;opacity:.3}
.matrix{background:#000}
.matrix canvas{width:100%;height:100%;display:block}

.console{flex:1;border:1px solid var(--green);margin:6px;padding:8px;font-size:12px;overflow:auto;background:#000;text-shadow:0 0 3px var(--green)}
.line{opacity:0;animation:show .1s forwards}
@keyframes show{to{opacity:1}}
.spon{border:1px solid #333;margin:6px;padding:8px;font-size:11px;color:#aaa}
.spon b{color:#0ff}
.kb{border-top:1px solid var(--green);padding:6px;background:#000}
.row{display:flex;gap:4px;margin-bottom:4px}
.key{flex:1;height:42px;border:1px solid var(--green);background:#001100;color:var(--green);border-radius:6px;font-size:14px;box-shadow:0 0 5px #00ff4130;transition:.2s}
.key:active{background:var(--green);color:#000}
.key.active{background:var(--red);color:#000;border-color:var(--red);box-shadow:0 0 20px var(--red);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 20px var(--red)}50%{box-shadow:0 0 35px var(--red)}}
.cursor{display:inline-block;width:8px;height:14px;background:var(--green);animation:blink .7s infinite}

#prank{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;flex-direction:column;background:#000}
#prank canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:1;opacity:0.4}
#prank .alert{position:relative;z-index:2;font-size:3.5rem;color:#fff;font-weight:bold;text-shadow:0 0 10px #f00, 0 0 20px #f00, 0 0 40px #f00, 0 0 60px #f00;animation:blink .5s infinite; white-space:nowrap; display:flex; align-items:center; gap:15px; flex-direction:column;}
#prank .warning{font-size:1.5rem; color:#ff0033; margin-top:10px; text-shadow: 0 0 5px #f00;}
</style>
</head>
<body>

<div id="loader-screen">
    <div style="width: 80%; max-width: 300px; height: 10px; border: 1px solid #00ff41; padding: 2px;">
        <div id="progress" style="width: 0%; height: 100%; background: #00ff41; box-shadow: 0 0 10px #00ff41; transition: width 0.1s;"></div>
    </div>
    <div style="color: #00ff41; font-family: monospace;">INITIALIZING SYSTEM... <span id="perc">0%</span></div>
</div>

<div class="top">
  <div class="box matrix"><canvas id="matrix"></canvas></div>
  <div class="box radar">
    <svg viewBox="0 0 100 100">
      <g class="grid"><circle cx="50" cy="50" r="45"/><circle cx="50" cy="50" r="30"/><circle cx="50" cy="50" r="15"/>
      <line x1="5" y1="50" x2="95" y2="50"/><line x1="50" y1="5" x2="50" y2="95"/></g>
      <g class="sweep"><path d="M50 50 L95 50" stroke="var(--green)" stroke-width="1.5" opacity=".7"/></g>
      <g id="greenDots">
        <circle class="blip" cx="20" cy="30" r="2" style="opacity:1"/>
        <circle class="blip" cx="80" cy="60" r="2" style="opacity:1"/>
        <circle class="blip" cx="40" cy="70" r="2" style="opacity:1"/>
      </g>
      <circle id="wave1" class="wave" cx="65" cy="35" r="3"/>
      <circle id="wave2" class="wave" cx="65" cy="35" r="3"/>
      <circle id="locPoint" cx="65" cy="35" r="3"/>
      <text id="locMsg" x="50" y="-3" text-anchor="middle">تم تحديد موقعك 💀</text>
    </svg>
  </div>
</div>

<div class="console" id="console">
  <div class="line">// SIMULATION MODE ACTIVE</div>
  <div class="line">user@device:~$ <span id="cmd"></span><span class="cursor"></span></div>
</div>

<div class="spon"><b>SPONSORED</b> | Heat Up - Cloud Village</div>

<div class="kb">
  <div class="row">
    <button class="key" data-k="Q">Q</button><button class="key" data-k="W">W</button><button class="key" data-k="E">E</button>
    <button class="key" data-k="R">R</button><button class="key" data-k="T">T</button><button class="key" data-k="Y">Y</button>
    <button class="key" data-k="U">U</button><button class="key" data-k="I">I</button><button class="key" data-k="O">O</button><button class="key" data-k="P">P</button>
  </div>
  <div class="row">
    <button class="key" data-k="A">A</button><button class="key" data-k="S">S</button><button class="key" data-k="D">D</button>
    <button class="key" data-k="F">F</button><button class="key" data-k="G">G</button><button class="key" data-k="H">H</button>
    <button class="key" data-k="J">J</button><button class="key" data-k="K">K</button><button class="key" data-k="L">L</button>
  </div>
  <div class="row">
    <button class="key" data-k="123">123</button><button class="key" data-k="Z">Z</button><button class="key" data-k="X">X</button>
    <button class="key" data-k="C">C</button><button class="key" data-k="V">V</button><button class="key" data-k="B">B</button>
    <button class="key" data-k="N">N</button><button class="key" data-k="M">M</button><button class="key" data-k="DEL">⌫</button>
  </div>
  <div class="row">
    <button class="key" style="flex:2" data-k=" " id="spaceBtn">SPACE</button>
    <button class="key" style="flex:1.5;background:#0a3a0a" data-k="ENTER">ENTER</button>
  </div>
</div>

<div id="prank">
  <canvas id="prankMatrix"></canvas>
  <div class="alert">
    <span>تم اختراقك ⚠️</span>
    <div class="warning">هاتفك في خطر 📵</div>
  </div>
</div>

<script>
// شريط التحميل
const loader = document.getElementById('loader-screen');
const progress = document.getElementById('progress');
const percText = document.getElementById('perc');

let width = 0;
const interval = setInterval(() => {
    if (width >= 100) {
        clearInterval(interval);
        loader.style.display = 'none';

        // الرادار (بعد 3 ثواني)
        setTimeout(() => {
            document.getElementById('greenDots').style.display = 'none'; 
            document.getElementById('locPoint').style.opacity = '1';
            document.getElementById('locMsg').style.opacity = '1';
            document.getElementById('wave1').classList.add('pulse');
            document.getElementById('wave2').classList.add('pulse2');
        }, 3000); // ⬅️ التعديل هنا
    } else {
        width++;
        progress.style.width = width + '%';
        percText.textContent = width + '%';
    }
}, 30);

// باقي الكود
const cvs=document.getElementById('matrix'),ctx=cvs.getContext('2d');
const pCvs=document.getElementById('prankMatrix'),pCtx=pCvs.getContext('2d');

function resize(){
    cvs.width=cvs.parentElement.clientWidth;
    cvs.height=cvs.parentElement.clientHeight;
    pCvs.width=window.innerWidth;
    pCvs.height=window.innerHeight;
}
resize();
addEventListener('resize',resize);

const fontSize=12;
let drops1 = Array(Math.floor(window.innerWidth/fontSize)).fill(0);
let drops2 = Array(Math.floor(window.innerWidth/fontSize)).fill(0);

function drawMatrix(context, width, height, color, drops){
  context.fillStyle='rgba(0,0,0,.05)';
  context.fillRect(0,0,width,height);
  context.fillStyle=color;
  context.font=fontSize+'px monospace';

  for(let i=0;i<drops.length;i++){
    context.fillText(Math.random()>0.5?'1':'0',i*fontSize,drops[i]*fontSize);
    if(drops[i]*fontSize>height && Math.random()>0.975){drops[i]=0}
    drops[i]++;
  }
}

setInterval(()=>drawMatrix(ctx, cvs.width, cvs.height, '#00ff41', drops1), 40);
setInterval(()=>drawMatrix(pCtx, pCvs.width, pCvs.height, '#ff0033', drops2), 40);

const consoleEl=document.getElementById('console');
const spaceBtn=document.getElementById('spaceBtn');
let cmd='', spaceUnlocked=false;

function addLine(text){
  const div=document.createElement('div');
  div.className='line';
  div.innerHTML=text;
  consoleEl.appendChild(div);
  consoleEl.scrollTop=consoleEl.scrollHeight;
}

document.querySelectorAll('.key').forEach(k=>{
  k.onclick=()=>{
    const v=k.dataset.k;
    if(v==='DEL'){cmd=cmd.slice(0,-1)}
    else if(v==='ENTER'){
      addLine(`user@device:~$ ${cmd}`);
      cmd='';
      if(!spaceUnlocked){
        spaceUnlocked=true;
        spaceBtn.classList.add('active');
        addLine('> SYSTEM: SPACE key UNLOCKED');
      }
    }
    else if(v===' '){
      if(spaceUnlocked){
        document.getElementById('prank').style.display='flex';
        if ("vibrate" in navigator) navigator.vibrate([200,100,200,100,500]);
      }
    }
    else{cmd+=v}
    document.getElementById('cmd').textContent=cmd;
  }
});
</script>
</body>
  </html>
